<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #18181b;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: none;
      background: none;
      color: #18181b;
      font-size: 13px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }
    .menu-item:hover {
      background: #f4f4f5;
    }
    .menu-item:first-child {
      border-radius: 4px 4px 0 0;
    }
    .menu-item:last-child {
      border-radius: 0 0 4px 4px;
    }
    .menu-item svg {
      flex-shrink: 0;
      color: #71717a;
    }
    .menu-item:hover svg {
      color: #18181b;
    }
    .menu-label {
      flex: 1;
    }
    .menu-shortcut {
      font-size: 11px;
      color: #a1a1aa;
    }
    .divider {
      height: 1px;
      background: #e4e4e7;
    }
  </style>
</head>
<body>
  <button class="menu-item" id="annotate">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/>
    </svg>
    <span class="menu-label">Annotate</span>
    <span class="menu-shortcut annotate-shortcut">⌥⇧A</span>
  </button>
  <div class="divider"></div>
  <button class="menu-item" id="viewer">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span class="menu-label">Viewer</span>
    <span class="menu-shortcut viewer-shortcut">⌥⇧V</span>
  </button>
  <script src="popup.js"></script>
</body>
</html>
